<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>上課簽到</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F1EC;--surface:#FFF;--ink:#1C1917;--ink2:#57534E;--ink3:#A8A29E;
  --border:rgba(28,25,23,.18);--border2:rgba(28,25,23,.08);
  --green:#1C4532;--gl:#D1FAE5;--gm:#059669;
  --amber:#92400E;--ab:#FEF3C7;
}
html,body{min-height:100vh;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink)}
body{display:flex;flex-direction:column}
/* top bar */
.top{background:var(--green);color:#fff;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.co{font-size:11px;letter-spacing:.08em;opacity:.8;font-family:'DM Mono',monospace}
.badge-top{font-size:10px;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;font-family:'DM Mono',monospace}
/* banner */
.banner{background:var(--surface);border-bottom:1px solid var(--border2);padding:14px 18px;display:none}
.b-title{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:7px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:11px;color:var(--ink2);background:var(--bg);padding:3px 9px;border-radius:20px;border:1px solid var(--border2);font-family:'DM Mono',monospace}
/* form */
.form-area{flex:1;padding:20px 18px 40px;max-width:480px;width:100%;margin:0 auto;display:none}
.lbl{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:7px;margin-top:20px;display:block}
.lbl:first-child{margin-top:0}
input.f,textarea.f{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;display:block}
input.f:focus,textarea.f:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(28,69,50,.10)}
input.f::placeholder,textarea.f::placeholder{color:var(--ink3)}
textarea.f{resize:none;height:72px;font-size:14px;line-height:1.5}
input.f.err{border-color:#E24B4A}
/* status */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sopt input{display:none}
.sopt label{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--surface)}
.sopt label .ico{font-size:22px}
.sopt label .tx{font-size:13px;font-weight:500;color:var(--ink2)}
.sopt label .sx{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}
.sopt input:checked+label{border-color:var(--green);background:var(--gl)}
.sopt input:checked+label .tx{color:var(--green)}
.sopt.late input:checked+label{border-color:var(--amber);background:var(--ab)}
.sopt.late input:checked+label .tx{color:var(--amber)}
/* eval */
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.eopt input{display:none}
.eopt label{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);transition:all .15s;text-align:center}
.eopt label .ei{font-size:18px}
.eopt label .et{font-size:10px;color:var(--ink2);line-height:1.3}
.eopt input:checked+label{border-color:var(--green);background:var(--gl)}
.eopt input:checked+label .et{color:var(--green);font-weight:600}
/* result */
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ropt input{display:none}
.ropt label{display:flex;align-items:center;justify-content:center;padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);font-size:13px;font-weight:500;color:var(--ink2);transition:all .15s}
.ropt input:checked+label{border-color:var(--green);background:var(--gl);color:var(--green)}
.ropt.fail input:checked+label{border-color:#E24B4A;background:#FEE2E2;color:#991B1B}
/* submit */
.sub-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:24px;letter-spacing:.04em;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.sub-btn:hover{background:#163d28}.sub-btn:active{transform:scale(.98)}.sub-btn:disabled{background:#b0b0b0;cursor:not-allowed;transform:none}
/* success */
.suc{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;flex:1;min-height:60vh}
.suc.show{display:flex}
.suc-ico{width:76px;height:76px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:20px;animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
.suc-name{font-size:22px;font-weight:700;margin-bottom:6px}
.suc-stat{font-size:14px;color:var(--ink2);margin-bottom:4px}
.suc-time{font-size:32px;font-weight:500;font-family:'DM Mono',monospace;color:var(--green);margin:16px 0 4px}
.suc-date{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:24px}
.suc-info{font-size:13px;color:var(--ink2);background:var(--bg);padding:12px 18px;border-radius:10px;max-width:300px;line-height:1.7;border:1px solid var(--border2)}
/* error */
.err-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;flex:1}
.err-screen.show{display:flex}
.err-ico{font-size:42px;margin-bottom:16px;opacity:.5}
.err-title{font-size:16px;font-weight:700;color:#991B1B;margin-bottom:10px}
.err-msg{font-size:13px;color:var(--ink2);line-height:1.8}
/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--ink3);font-size:13px;font-family:'DM Mono',monospace}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top">
  <span class="co">秋雨創新股份有限公司</span>
  <span class="badge-top">內部訓練簽到</span>
</div>

<div class="loading" id="loading"><div class="spin"></div>載入課程資訊中…</div>

<div class="err-screen" id="err-screen">
  <div class="err-ico">⚠️</div>
  <div class="err-title">無法載入課程資訊</div>
  <div class="err-msg" id="err-msg">請確認您的 QR Code 是最新的，<br>或請老師重新產生 QR Code。</div>
</div>

<div class="banner" id="banner">
  <div class="b-title" id="b-course">—</div>
  <div class="pills" id="b-pills"></div>
</div>

<div class="form-area" id="form-area">
  <span class="lbl">員工姓名 *</span>
  <input class="f" id="inp-name" type="text" placeholder="請輸入您的姓名" autocomplete="name" />

  <span class="lbl">員工編號</span>
  <input class="f" id="inp-id" type="text" placeholder="選填" autocomplete="off" />

  <span class="lbl">出席狀態</span>
  <div class="sgrid">
    <div class="sopt">
      <input type="radio" name="st" id="sp" value="present" checked />
      <label for="sp"><span class="ico">✅</span><span class="tx">準時出席</span><span class="sx">on time</span></label>
    </div>
    <div class="sopt late">
      <input type="radio" name="st" id="sl" value="late" />
      <label for="sl"><span class="ico">🕐</span><span class="tx">遲到</span><span class="sx">late arrival</span></label>
    </div>
  </div>

  <span class="lbl">考核方式（4小時以上課程需填）</span>
  <div class="egrid">
    <div class="eopt"><input type="radio" name="eval" id="e0" value="" checked /><label for="e0"><span class="ei">—</span><span class="et">不適用</span></label></div>
    <div class="eopt"><input type="radio" name="eval" id="e1" value="1" /><label for="e1"><span class="ei">🔧</span><span class="et">實地操作</span></label></div>
    <div class="eopt"><input type="radio" name="eval" id="e2" value="2" /><label for="e2"><span class="ei">📝</span><span class="et">隨堂測驗</span></label></div>
    <div class="eopt"><input type="radio" name="eval" id="e3" value="3" /><label for="e3"><span class="ei">💬</span><span class="et">心得發表</span></label></div>
    <div class="eopt"><input type="radio" name="eval" id="e4" value="4" /><label for="e4"><span class="ei">🗣️</span><span class="et">座談會</span></label></div>
  </div>

  <span class="lbl">考核結果（4小時以上課程需填）</span>
  <div class="rgrid">
    <div class="ropt"><input type="radio" name="res" id="rn" value="" checked /><label for="rn">— 不適用</label></div>
    <div class="ropt"><input type="radio" name="res" id="rp" value="合格" /><label for="rp">✓ 合格</label></div>
    <div class="ropt fail"><input type="radio" name="res" id="rf" value="不合格" /><label for="rf">✗ 不合格</label></div>
  </div>

  <span class="lbl">備註</span>
  <textarea class="f" id="inp-note" placeholder="選填（例：提早離開原因等）"></textarea>

  <button class="sub-btn" id="sub-btn" onclick="doSubmit()">確認簽到</button>
</div>

<div class="suc" id="suc">
  <div class="suc-ico">✓</div>
  <div class="suc-name" id="suc-name">—</div>
  <div class="suc-stat" id="suc-stat">簽到成功</div>
  <div class="suc-time" id="suc-time">—</div>
  <div class="suc-date" id="suc-date">—</div>
  <div class="suc-info" id="suc-info">—</div>
</div>

<script>
// ══════════════════════════════════════════
//  GAS_URL 由 teacher.html 下載時自動填入
//  請勿手動修改此行
// ══════════════════════════════════════════
const GAS_URL = '%%GAS_URL%%';

let meta = null;
const pad = n => n < 10 ? '0' + n : n;
const nowTime = () => { const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); };
const nowDate = () => { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };

function showErr(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('err-msg').innerHTML = msg || '請確認 QR Code 是最新的，或請老師重新產生。';
  document.getElementById('err-screen').classList.add('show');
}

function init() {
  try {
    const h = location.hash.slice(1);
    if (!h) throw new Error('缺少課程資訊，請掃描正確的 QR Code。');
    meta = JSON.parse(decodeURIComponent(escape(atob(h))));
    if (!GAS_URL || GAS_URL === '%%GAS_URL%%') throw new Error('尚未設定後端網址，請請老師重新下載 student.html。');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('b-course').textContent = meta.course || '（未命名課程）';
    const pills = [];
    if (meta.date)     pills.push('📅 ' + meta.date);
    if (meta.time)     pills.push('🕐 ' + meta.time);
    if (meta.teacher)  pills.push('👤 ' + meta.teacher);
    if (meta.location) pills.push('📍 ' + meta.location);
    document.getElementById('b-pills').innerHTML = pills.map(p => '<span class="pill">'+p+'</span>').join('');
    document.getElementById('banner').style.display = 'block';
    document.getElementById('form-area').style.display = 'block';
    setTimeout(() => document.getElementById('inp-name').focus(), 300);
  } catch(e) {
    showErr(e.message);
  }
}

async function doSubmit() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) {
    const el = document.getElementById('inp-name');
    el.classList.add('err'); el.focus();
    setTimeout(() => el.classList.remove('err'), 1800);
    return;
  }
  const btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.textContent = '送出中…';

  const payload = {
    action:     'checkin',
    sessionId:  meta.sessionId,
    name,
    empId:      document.getElementById('inp-id').value.trim(),
    status:     document.querySelector('input[name="st"]:checked').value,
    evalMethod: document.querySelector('input[name="eval"]:checked').value,
    evalResult: document.querySelector('input[name="res"]:checked').value,
    note:       document.getElementById('inp-note').value.trim(),
    time:       nowTime(),
    date:       nowDate(),
    course:     meta.course,
    courseDate: meta.date,
    courseTime: meta.time,
    teacher:    meta.teacher,
    location:   meta.location,
    code:       meta.code
  };

  try {
    const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '伺服器錯誤');
  } catch(err) {
    btn.disabled = false; btn.textContent = '確認簽到';
    alert('簽到失敗：' + err.message + '\n\n請確認網路連線，或通知老師。');
    return;
  }

  document.getElementById('banner').style.display = 'none';
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('suc-name').textContent  = name;
  document.getElementById('suc-stat').textContent  = payload.status === 'present' ? '✓ 已出席' : '已記錄為遲到';
  document.getElementById('suc-time').textContent  = payload.time;
  document.getElementById('suc-date').textContent  = payload.date;
  document.getElementById('suc-info').innerHTML    = '<strong>' + meta.course + '</strong><br>' +
    [meta.date, meta.teacher, meta.location].filter(Boolean).join('　');
  document.getElementById('suc').classList.add('show');
}

init();
</script>
</body>
</html>
